<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>系统检测中...</title>
<style>
  body {
    background: black;
    color: red;
    font-family: monospace;
    text-align: center;
    padding-top: 100px;
  }
</style>
</head>

<body>
  <h1>⚠️ 检测到异常行为 ⚠️</h1>
  <p id="text">正在扫描你的设备...</p>

<script>
let texts = [
  "正在获取通讯录...",
  "正在上传照片...",
  "正在同步聊天记录...",
  "正在发送到服务器...",
  "完成！"
];

let i = 0;

setInterval(() => {
  if (i < texts.length) {
    document.getElementById("text").innerText = texts[i];
    i++;
  } else {
    alert("开个玩笑 😂 没有任何数据被获取！");
  }
}, 1500);

// 禁止返回
history.pushState(null, null, location.href);
window.onpopstate = function () {
  history.go(1);
};
</script>

</body>
</html>
